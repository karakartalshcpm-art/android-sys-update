name: custom stealth frida build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Advanced Shield and Automatic Error Diagnosis
        run: |
          echo "[*] 1. AŞAMA BAŞLADI: Yerel Python paket altyapısı kuruluyor..."
          sudo apt-get update -y && sudo apt-get install -y python3-pip python3-setuptools xz-utils curl || {
            echo "[-] TEŞHİS: GitHub Ubuntu paket depolarına erişim sağlanamadı veya kilitlendi."
            exit 1
          }

          echo "[*] 2. AŞAMA BAŞLADI: Resmi kütüphaneler sisteme entegre ediliyor..."
          pip3 install frida-tools==12.3.0 || {
            echo "[-] TEŞHİS: Python pip sunucularında veya frida paket kurulumunda hata oluştu."
            exit 1
          }

          echo "[*] 3. AŞAMA BAŞLADI: Güvenli sunucudan resmi binary çekiliyor..."
          # wget yerine yönlendirmeleri otomatik çözen daha kararlı curl motorunu kullanıyoruz
          curl -L -q "https://github.com" -o sys_daemon.xz || {
            echo "[-] TEŞHİS: İnternet ağ hatası. Resmi GitHub Releases indirme sunucusuna erişilemiyor."
            exit 1
          }

          echo "[*] 4. AŞAMA BAŞLADI: Arşiv bütünlüğü ve dosya formatı denetleniyor..."
          # Arşiv bozuksa veya boş sayfa indiyse hatayı burada havada yakalıyoruz
          xz -t sys_daemon.xz || {
            echo "[-] TEŞHİS: Sunucudan indirilen sys_daemon.xz dosyası bozuk veya kırık bir indirme linki (404/Yönlendirme Hatası)."
            exit 1
          }
          
          xz -d --force sys_daemon.xz || {
            echo "[-] TEŞHİS: xz arşiv açma motoru bilinmeyen bir sistem hatası nedeniyle kilitlendi."
            exit 1
          }

          echo "[*] 5. AŞAMA BAŞLADI: Hayalet ameliyat motoru ikili kodları manipüle ediyor..."
          python3 -c "
          try:
              with open('sys_daemon', 'rb') as f:
                  data = f.read()
              
              # frida -> audio (5 harf) | Frida -> Audio (5 harf) bütünlük korunur
              data = data.replace(b'frida', b'audio')
              data = data.replace(b'Frida', b'Audio')
              
              with open('sys_daemon', 'wb') as f:
                  f.write(data)
              print('[+] BAŞARILI: Benzersiz hayalet dijital imza (hash) oluşturuldu.')
          except Exception as e:
              print(f'[-] TEŞHİS: İkili dosya (Binary) düzenleme aşamasında çökme: {e}')
              import sys; sys.exit(1)
          " || exit 1
          
          chmod 777 sys_daemon
          echo "[SUCCESS] TÜM OLASI HATALAR BAŞARIYLA DENETLENDİ VE GİZLİ DOSYA ÜRETİLDİ!"

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: sys_daemon
