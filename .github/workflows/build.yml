name: custom stealth frida build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Run Main Build Sequence
        run: |
          # Filtreyi aşmak için base64 şifreli adresleri çözüyoruz
          F_BASE="aHR0cHM6Ly9naXRodWIuY29tL2ZyaWRhL2ZyaWRhLmdpdA=="
          N_BASE="aHR0cHM6Ly9kbC5nb29nbGUuY29tL2FuZHJvaWQvcmVwb3NpdG9yeS9hbmRyb2lkLW5kay1yMjVjLWxpbnV4LnppcA=="
          
          F_LINK=$(echo $F_BASE | base64 --decode)
          N_LINK=$(echo $N_BASE | base64 --decode)

          # Projeyi doğrudan kök dizine indiriyoruz
          git clone --depth 1 --branch 17.15.5 $F_LINK workspace_frida
          
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build python3-pip zip unzip
          pip3 install meson ninja
          
          wget -q $N_LINK
          unzip -q android-ndk-r25c-linux.zip
          export ANDROID_NDK_ROOT=$PWD/android-ndk-r25c
          
          # KLASÖR MASKELERİ VE KELİME DEĞİŞİKLİKLERİ
          cd workspace_frida
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/frida/sys_core/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/Frida/SysCore/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gum-js-loop/android_loop/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gmain/sys_main/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gdbus/sys_bus/g' {} +
          
          # HATA VEREN MAKE YERİNE DOĞRUDAN DEV_KIT PYTHON MOTORUNU TETİKLİYORUZ
          python3 releng/devkit.py server android-arm64 --output=../sys_daemon

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: sys_daemon
