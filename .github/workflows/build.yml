name: custom stealth frida build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Extract Frida Server and Stealth Patch
        run: |
          echo "[*] 1. AŞAMA: Resmi Python kütüphaneleri sunucuya yükleniyor..."
          sudo apt-get update -y && sudo apt-get install -y python3-pip python3-setuptools || exit 1
          
          # Bilgisayarınızdaki sürümle tam eşleşen resmi paketi kuruyoruz
          pip3 install frida-tools==12.3.0 || exit 1

          echo "[*] 2. AŞAMA: Gizli Android sunucu dosyası Python paketinin içinden sökülüyor..."
          # Sunucunun internet linklerine bağımlılığını bitirmek için sistem klasörünü tarıyoruz
          python3 -c "
          import os, shutil, frida
          # Frida kütüphanesinin kurulu olduğu ana sistem dizinini buluyoruz
          frida_dir = os.path.dirname(frida.__file__)
          
          # Sistem içindeki orijinal android binaries klasörünü tarayıp server dosyasını buluyoruz
          found = False
          for root, dirs, files in os.walk(frida_dir):
              for file in files:
                  if 'frida-server' in file and 'android-arm64' in file:
                      src_path = os.path.join(root, file)
                      shutil.copy(src_path, 'sys_daemon')
                      found = True
                      break
          
          if found:
              print('[+] BAŞARILI: Orijinal sunucu kütüphanenin içinden başarıyla söküldü.')
          else:
              # Alternatif olarak genel binary havuzundan çekmeyi deniyoruz
              bin_path = os.path.join(os.path.dirname(os.path.dirname(frida_dir)), 'bin', 'frida-server')
              if os.path.exists(bin_path):
                  shutil.copy(bin_path, 'sys_daemon')
                  print('[+] BAŞARILI: Orijinal sunucu sistem bin klasöründen kopyalandı.')
              else:
                  print('[-] HATA: Dosya kütüphane içinde bulunamadı.')
                  import sys; sys.exit(1)
          " || exit 1

          echo "[*] 3. AŞAMA: Hayalet ameliyat motoru ikili kodlardaki imzaları maskeliyor..."
          python3 -c "
          try:
              with open('sys_daemon', 'rb') as f:
                  data = f.read()
              
              # 5 harfe 5 harf kuralı ile dosya yapısını (ELF) bozmadan frida izlerini siliyoruz
              data = data.replace(b'frida', b'audio')
              data = data.replace(b'Frida', b'Audio')
              
              with open('sys_daemon', 'wb') as f:
                  f.write(data)
              print('[+] BAŞARILI: Sadece size özel benzersiz dijital imza (hash) oluşturuldu.')
          except Exception as e:
              print(f'[-] HATA: Binary manipülasyon hatası: {e}')
              import sys; sys.exit(1)
          " || exit 1
          
          chmod 777 sys_daemon
          echo "[SUCCESS] TÜM HARİCİ İNDİRME HATALARI ENGELLENDİ VE GİZLİ DOSYA BAŞARIYLA ÜRETİLDİ!"

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: sys_daemon
