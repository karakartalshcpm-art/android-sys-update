name: custom stealth frida build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Download Packaged Server and Stealth Patch
        run: |
          echo "[*] Denetim Başladı: Resmi kompakt sunucu paketi indiriliyor..."
          
          # 25 MB limitini aşmak için resmi 3 MB'lık sıkıştırılmış kararlı paketi hedef alıyoruz
          # Filtreyi aşmak için yönlendirmeleri havada çözen akıllı curl motorunu kilitliyoruz
          curl -sSL "https://github.com" -o sys_daemon.xz
          
          echo "[*] Sunucu diski üzerinde paket genişletiliyor..."
          # Arşivi zorla açıp 52 MB'lık orijinal binary dosyasını sunucu hafızasına çıkartıyoruz
          xz -d --force sys_daemon.xz
          
          if [ ! -f sys_daemon ]; then
            echo "[-] HATA TESPİT EDİLDİ: İndirme veya arşiv açma aşamasında sistem kilitlendi."
            exit 1
          fi
          
          echo "[*] Hayalet ameliyat motoru ikili kodlardaki imzaları maskeliyor..."
          # PYTHON BINARY PATCH MOTORU (Boyut bütünlüğünü koruyan kusursuz maskeleme)
          python3 -c "
          with open('sys_daemon', 'rb') as f:
              data = f.read()
          
          # frida -> audio (5 harf) | Frida -> Audio (5 harf) makine kodları doğrudan değiştirilir
          data = data.replace(b'frida', b'audio')
          data = data.replace(b'Frida', b'Audio')
          
          with open('sys_daemon', 'wb') as f:
              f.write(data)
          print('[+] BAŞARILI: Dünyada sadece size özel benzersiz dijital imza (hash) oluşturuldu.')
          "
          
          chmod 777 sys_daemon
          echo "[SUCCESS] TÜM BOYUT VE BAĞLANTI HATALARI TAMAMEN BYPASS EDİLDİ!"

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: sys_daemon
