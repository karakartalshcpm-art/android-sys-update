name: custom stealth frida build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Advanced Error Detection and Stealth Patching
        run: |
          # 1. ADIM: Kararsız apt-get update komutunu tamamen kaldırarak kilitlenmeyi önceden engelliyoruz.
          echo "[*] Denetim Başladı: GitHub Ubuntu 22.04 yerel bileşenleri kontrol ediliyor..."
          
          # 2. ADIM: Base64 indirme hattını doğrulayarak linkin kırık olup olmadığını önceden tespit ediyoruz.
          F_BASE="aHR0cHM6Ly9naXRodWIuY29tL2h6emhleWFuZy9zdHJvbmdSLWZyaWRhLWFuZHJvaWQvcmVsZWFzZXMvZG93bmxvYWQvMTcuMTUuNS9zdHJvbmdSLWZyaWRhLXNlcnZlci0xNy4xNS41LWFuZHJvaWQtYXJtNjQueHo="
          S_LINK=$(echo $F_BASE | base64 --decode)
          
          echo "[*] İndirme köprüsü kuruluyor: $S_LINK"
          
          # wget hatasını yakalamak için çıkış durumunu kaydediyoruz (Exit code 8 kontrolü)
          wget -q $S_LINK -O sys_daemon.xz
          if [ $? -ne 0 ]; then
            echo "[-] HATA TESPİT EDİLDİ: Hedef indirme linki sunucudan silinmiş veya erişilemez durumda (404 Error)."
            exit 1
          fi
          echo "[+] BAŞARILI: Dosya hatasız indirildi."

          # 3. ADIM: xz dosya kalıntısı veya izin kilitlenmesi hatalarını önceden temizleyerek eziyoruz.
          echo "[*] Arşiv denetleniyor ve zorla dışarı çıkartılıyor..."
          xz -d --force sys_daemon.xz
          if [ ! -f sys_daemon ]; then
            echo "[-] HATA TESPİT EDİLDİ: xz arşivi bozuk veya dosya dışarı çıkartılamadı."
            exit 1
          fi
          echo "[+] BAŞARILI: İkili dosya (binary) sistem tarafından doğrulandı."

          # 4. ADIM: Python kodunun içindeki olası sözdizimi hatalarını tek satır formatında garantiye alıyoruz.
          echo "[*] Hayalet ameliyat motoru ikili kodları tarıyor..."
          python3 -c "
          try:
              with open('sys_daemon', 'rb') as f:
                  data = f.read()
              
              # Boyut bütünlüğünü bozmayan (5 harfe 5 harf) maskeleme yapılıyor
              data = data.replace(b'frida', b'audio')
              data = data.replace(b'Frida', b'Audio')
              
              with open('sys_daemon', 'wb') as f:
                  f.write(data)
              print('[+] BAŞARILI: Benzersiz hayalet dijital imza oluşturuldu.')
          except Exception as e:
              print(f'[-] HATA TESPİT EDİLDİ: Binary manipülasyon hatası: {e}')
              import sys; sys.exit(1)
          "
          
          chmod 777 sys_daemon
          echo "[SUCCESS] TÜM HATALAR ÖNCEDEN ENGELLENDİ VE DOSYA BAŞARIYLA ÜRETİLDİ!"

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: sys_daemon
