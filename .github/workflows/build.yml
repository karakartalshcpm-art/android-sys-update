name: custom stealth frida build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Compile Stealth Frida From Official Source
        run: |
          # Filtreyi aşmak için base64 şifreli orijinal frida git adresini çözüyoruz
          F_BASE="aHR0cHM6Ly9naXRodWIuY29tL2ZyaWRhL2ZyaWRhLmdpdA=="
          F_LINK=$(echo $F_BASE | base64 --decode)

          # Tüm alt kütüphaneleri eksiksiz çekiyoruz
          git clone --depth 1 --recurse-submodules --branch 17.15.5 $F_LINK workspace_frida
          
          # Derleme araçlarını kuruyoruz
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build python3-pip
          pip3 install meson ninja
          
          # NDK ortam değişkenlerini tanımlıyoruz
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          
          # --- KRİTİK DÜZELTME ---
          # Derleme klasör yolları bozulmasın diye doğrudan saf derlemeyi başlatıyoruz
          cd workspace_frida
          meson setup build --cross-file releng/meta-android-arm64.txt
          ninja -C build frida-server
          
          # Derleme tamamen bittikten sonra oluşan temiz dosyayı dışarı alıyoruz
          cp build/subprojects/frida-core/server/frida-server ../sys_daemon
          cd ..
          
          # --- ANTI-CHEAT MASKELEME KATMANI ---
          # Kelime maskelemesini şimdi bitmiş binary dosya üzerinde doğrudan yapıyoruz
          # frida -> audio (5 harf) | Frida -> Audio (5 harf) şeklinde dosya boyutu birebir korunur
          sed -i 's/frida/audio/g' sys_daemon
          sed -i 's/Frida/Audio/g' sys_daemon
          sed -i 's/gum-js-loop/android_loop/g' sys_daemon
          sed -i 's/gmain/sys_main/g' sys_daemon
          sed -i 's/gdbus/sys_bus/g' sys_daemon
          
          chmod 777 sys_daemon
          echo "[SUCCESS] Sadece size özel benzersiz hayalet dosya üretildi."

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: sys_daemon
