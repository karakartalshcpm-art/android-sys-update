name: custom-stealth-frida-build

on:
  workflow_dispatch:

permissions:
  contents: write
  releases: write

jobs:
  build_invisible_server:
    runs-on: ubuntu-22.04
    steps:
      - name: Clone Official Frida Source Code
        run: |
          # Bilgisayarınızdaki 17.15.5 sürümüyle tam uyuşması için sürümü kilitliyoruz
          git clone --depth 1 --branch 17.15.5 https://github.com

      - name: Install Official Linux and Android Compiler Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build python3-pip
          pip3 install meson ninja

      - name: Execute Automated Pure Stealth Word Patching
        run: |
          cd frida/frida-core
          # Hile korumasının taradığı tüm imza metinlerini sunucu üzerinde maskeliyoruz
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/frida/sys_core/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/Frida/SysCore/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gum-js-loop/android_loop/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gmain/sys_main/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gdbus/sys_bus/g' {} +

      - name: Build Pure Android ARM64 Server Binary
        run: |
          cd frida
          # Harici betikler yerine doğrudan Makefile ana motoruyla derlemeyi tetikliyoruz
          make server-android-arm64

      - name: Extract and Upload Invisible File to Your Repository Panel
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: frida/build/frida-android-arm64/bin/frida-server
