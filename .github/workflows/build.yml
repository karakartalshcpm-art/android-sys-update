name: strongR-frida-custom-build

permissions:
  contents: write
  releases: write

on:
  workflow_dispatch:

jobs:
  compile_stealth_frida:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Android Toolchain (NDK)
        uses: nndg/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Compiler Tools
        run: |
          pip install meson ninja

      - name: Download Frida and Inject Anti-Detection Patches
        run: |
          # Bilgisayarınızdaki Python sürümüyle tam uyuşması için 17.15.5 sürümünü kilitliyoruz
          git clone --depth 1 --branch 17.15.5 https://github.com
          cd frida/frida-core
          
          # Hile korumasının (Anti-Cheat) imza taramalarını bozmak için iç kelimeleri tamamen maskeliyoruz
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/frida/sys_core/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/Frida/SysCore/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gum-js-loop/android_loop/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gmain/sys_main/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gdbus/sys_bus/g' {} +

      - name: Build Standalone ARM64 Server for Emulator
        run: |
          cd frida
          # LDPlayer emülatörünüzün altyapısı için saf binary derlemesi yapılıyor
          python releng/devkit.py server android-arm64 --output=../sys_daemon

      - name: Upload Clean Stealth File to GitHub Panel
        uses: actions/upload-artifact@v4
        with:
          name: my-private-stealth-frida-server
          path: sys_daemon
