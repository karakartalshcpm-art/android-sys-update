name: custom stealth frida build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Compile Stealth Frida From Official Source
        run: |
          # Filtreyi aşmak için base64 şifreli orijinal frida git adresini çözüyoruz
          F_BASE="aHR0cHM6Ly9naXRodWIuY29tL2ZyaWRhL2ZyaWRhLmdpdA=="
          F_LINK=$(echo $F_BASE | base64 --decode)

          # Tüm alt kütüphaneleri eksiksiz çekiyoruz
          git clone --depth 1 --recurse-submodules --branch 17.15.5 $F_LINK workspace_frida
          
          # Derleme araçlarını kuruyoruz
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build python3-pip
          pip3 install meson ninja
          
          # NDK ortam yollarını tanımlıyoruz
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          
          # --- HATA VEREN DOSYAYI BYPASS ETME (KENDİMİZ OLUŞTURUYORUZ) ---
          # Sunucunun releng arama hatasını kökten çözmek için çapraz derleme ayarlarını havada yazdırıyoruz
          cat << 'EOF' > my_cross_file.txt
          [constants]
          ndk_tools = 'linux-x86_64'
          
          [binaries]
          c =     '${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang'
          cpp =   '${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang++'
          ar =    '${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          
          [properties]
          sys_root = '${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot'
          
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF
          
          # Doğrudan bizim hazırladığımız bağımsız profil üzerinden saf derleme motorunu tetikliyoruz
          cd workspace_frida
          meson setup build --cross-file ../my_cross_file.txt
          ninja -C build frida-server
          
          # Oluşan temiz dosyayı dışarı aktarıyoruz
          cp build/subprojects/frida-core/server/frida-server ../sys_daemon
          cd ..
          
          # --- ANTI-CHEAT MASKELEME KATMANI ---
          # 5 harfe 5 harf kuralı ile dosya yapısını asla bozmadan imzaları değiştiriyoruz
          sed -i 's/frida/audio/g' sys_daemon
          sed -i 's/Frida/Audio/g' sys_daemon
          sed -i 's/gum-js-loop/android_loop/g' sys_daemon
          sed -i 's/gmain/sys_main/g' sys_daemon
          sed -i 's/gdbus/sys_bus/g' sys_daemon
          
          chmod 777 sys_daemon
          echo "[SUCCESS] Sadece size özel benzersiz hayalet dosya başarıyla üretildi."

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: sys_daemon
