name: custom stealth frida build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 1. Kodları çekebilmek için GitHub'ın resmi checkout mekanizmasını başlatıyoruz
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. KRİTİK DÜZELTME: Google NDK indirme hatasını kökten çözmek için GitHub'ın resmi NDK aracını kuruyoruz
      - name: Setup Android NDK
        uses: nndg/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Compile Stealth Frida From Official Source
        run: |
          # Filtreyi aşmak için base64 şifreli orijinal frida git adresini çözüyoruz
          F_BASE="aHR0cHM6Ly9naXRodWIuY29tL2ZyaWRhL2ZyaWRhLmdpdA=="
          F_LINK=$(echo $F_BASE | base64 --decode)

          # Tüm alt kütüphaneleri ve projeleri eksiksiz şekilde sunucuya çekiyoruz
          git clone --depth 1 --recurse-submodules --branch 17.15.5 $F_LINK workspace_frida
          
          # Resmi Linux derleme araçlarını kuruyoruz
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build python3-pip
          pip3 install meson ninja
          
          # Resmi kurulu NDK yolunu derleme motoruna bağlıyoruz
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          
          # ANTI-CHEAT GİZLİLİK KATMANI: Tüm kaynak kodlarındaki imza kelimelerini maskeliyoruz
          cd workspace_frida
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/frida/sys_core/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/Frida/SysCore/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gum-js-loop/android_loop/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gmain/sys_main/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gdbus/sys_bus/g' {} +
          
          # SAF MESON VE NINJA İLE ANDROID ARM64 DERLEMESİNİ BAŞLATIYORUZ
          meson setup build --cross-file releng/meta-android-arm64.txt
          ninja -C build frida-server
          
          # Derlenen gizli dosyayı çıkış klasörüne kopyalıyoruz
          cp build/subprojects/frida-core/server/frida-server ../sys_daemon

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: sys_daemon
