name: custom-stealth-frida-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Clone Frida Source
        run: git clone --depth 1 --branch 17.15.5 https://github.com

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build python3-pip
          pip3 install meson ninja

      - name: Setup Android NDK
        uses: nndg/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Apply Anti-Detection Patches
        run: |
          cd frida/frida-core
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/frida/sys_core/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/Frida/SysCore/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gum-js-loop/android_loop/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gmain/sys_main/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.txt" \) -exec sed -i 's/gdbus/sys_bus/g' {} +

      - name: Compile Frida Server
        run: |
          cd frida
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          make server-android-arm64

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-stealth-frida-server-17.15.5
          path: frida/build/frida-android-arm64/bin/frida-server
